<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroConnect - Negociações</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/var_globais.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/layout_inicial.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/header.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/título.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/barra_filtros.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/toggle_lista_calendário.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/cad_pedido.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/badges_status.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/pag_detalhes.css">
    <link rel="stylesheet" href="../static/css/estabelecimentos/negociações_estabelecimentos/responsividade.css">
</head>
<body>

    <header class="main-header">
        <button class="menu-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="logo">AgroConnect</div>
    </header>

    <main id="view-lista" class="container">
        <div class="page-header">
            <h1>Negociações/Pedidos</h1>
            <div class="view-toggle">
                <button class="toggle-btn active">Lista</button>
                <button class="toggle-btn">Calendário 📅</button>
            </div>
        </div>

        <div class="filters-bar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#5FAE3E"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar produtos ou produtores...">
            </div>
            <select id="statusFilter" class="status-select">
                <option value="Todos">Status (Todos)</option>
                <option value="Pendente">Pendente</option>
                <option value="Aceito">Aceito</option>
                <option value="Recusado">Recusado</option>
            </select>
        </div>

        <div id="orders-grid" class="orders-grid"></div>
    </main>

    <main id="view-detalhes" class="container" style="display: none;">
        <button onclick="hideDetails()" class="btn-back">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Voltar
        </button>

        <div class="details-card" id="details-content"></div>
    </main>

    <script src="../static/js/estabelecimentos/negociações/lógica.js"></script>
</body>
</html>
