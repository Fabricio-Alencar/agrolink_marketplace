<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtores</title>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/produtores/meus_produtos/botoes.css">
    <link rel="stylesheet" href="../static/css/produtores/meus_produtos/grid.css">
    <link rel="stylesheet" href="../static/css/produtores/meus_produtos/card.css">
    <link rel="stylesheet" href="../static/css/produtores/meus_produtos/botoes_card.css">
    <link rel="stylesheet" href="../static/css/produtores/meus_produtos/status.css">
    <link rel="stylesheet" href="../static/css/produtores/formulario/modal.css">

    <link rel="stylesheet" href="../static/css/produtores/formulario/buttons_modal.css">
    <link rel="stylesheet" href="../static/css/produtores/formulario/form.css">
    <link rel="stylesheet" href="../static/css/produtores/formulario/upload_descricao.css">
</head>

<body>

<header class="header">
    <div class="logo">🌱 AgroConnect</div>

    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Produtores</a>
        <a href="#">Receitas</a>
    </nav>
</header>

<main class="main">

    <!-- TÍTULO -->
    <section class="topo">
        <h1>Meus Produtos</h1>
    </section>

    <!-- BUSCA -->
    <section class="busca">
        <div class="input-wrapper">
            <img src="../static/assets/lupa.png" class="icone-busca" alt="">
            <input id="searchInput" type="text" placeholder="Pesquisar Produtos...">
        </div>
    </section>

    <!-- AÇÕES -->
    <section class="acoes">
        <button class="acao-btn">
            <img src="../static/assets/download.png" alt="">
            <span>Baixar Template Excel</span>
        </button>

        <button class="acao-btn">
            <img src="../static/assets/upload.png" alt="">
            <span>Enviar Planilha</span>
        </button>

        <button class="acao-btn" onclick="abrirModal()">
            <img src="../static/assets/mais.png">
            <span>Adicionar Produto</span>
        </button>
    </section>

    <!-- CONTAINER -->
    <section id="produtosContainer" class="produtores-container"></section>

</main>

<!-- =========================
     MODAL
========================= -->
<div id="modalProduto" class="modal">

    <div class="modal-content">

        <!-- FECHAR -->
        <button class="btn-fechar" onclick="fecharModal()"></button>

        <div class="titulo-modal">
            <img src="../static/assets/caixa.png" alt="Ícone produto">
            <h2>Adicionar Produto</h2>
        </div>


        <!-- NOME -->
        <div class="campo">
            <label for="nomeProduto">Nome do produto</label>
            <input type="text" id="nomeProduto" placeholder="Ex: Laranja">
        </div>

        <!-- CATEGORIA -->
        <div class="campo">
            <label for="categoriaProduto">Categoria</label>
            <select id="categoriaProduto">
                <option value="fruta">Fruta</option>
                <option value="legume">Legume</option>
                <option value="hortalica">Hortaliça</option>
            </select>
        </div>

        <!-- PREÇO + UNIDADE -->
        <div class="linha-form">

            <div class="campo">
                <label for="precoProduto">Preço (R$)</label>
                <input type="number" id="precoProduto" placeholder="Ex: 3,00" step="0.01" min="0">
            </div>

            <div class="campo">
                <label for="unidadeProduto">Unidade</label>
                <select id="unidadeProduto">
                    <option value="kg">Kg</option>
                    <option value="unidade">Unidade</option>
                    <option value="g">Gramas</option>
                </select>
            </div>
        </div>

        <!-- QUANTIDADE -->
        <div class="campo">
            <label for="quantidadeProduto">Quantidade Disponível</label>
            <input id="quantidadeProduto" placeholder="Ex: 10 caixas/ 100 gramas" min="1">
        </div>


        <!-- DESCRIÇÃO + FOTO -->
        <div class="linha-form big">

            <!-- DESCRIÇÃO -->
            <div class="campo caixa-grande">
                <label for="descricaoProduto">Descrição</label>
                <textarea id="descricaoProduto" placeholder="Ex: Fruta doce e fresca"></textarea>
            </div>

            <!-- UPLOAD FOTO -->
            <div class="campo caixa-grande">

                <label>Foto do produto</label>

                <!-- AREA DE UPLOAD (vai virar drag & drop depois) -->
                <div class="upload-box" id="uploadBox">

                    <input type="file" id="fotoProduto" accept="image/*" hidden>

                </div>

            </div>

        </div>

        <!-- BOTÕES -->
        <div class="botoes-modal">

            <button class="btn-rascunho" onclick="salvarRascunho()">
                <img src="../static/assets/rascunho.png">
                Salvar Rascunho
            </button>

            <button class="btn-publicar" onclick="publicarProduto()">
                <img src="../static/assets/publicado.png">
                Publicar Produto
            </button>

        </div>

    </div>

</div>

<!-- JS -->
<script src="../static/js/produtores/rendenizar.js"></script>
<script src="../static/js/produtores/formulario.js"></script>

</body>
</html>
