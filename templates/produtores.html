<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtores</title>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/produtores/botoes.css">
    <link rel="stylesheet" href="../static/css/produtores/grid.css">
    <link rel="stylesheet" href="../static/css/produtores/card.css">
    <link rel="stylesheet" href="../static/css/produtores/botoes_card.css">
    <link rel="stylesheet" href="../static/css/produtores/status.css">
</head>

<body>

<header class="header">
    <div class="logo">🌱 AgroConnect</div>

    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Produtores</a>
        <a href="#">Receitas</a>
    </nav>
</header>

<main class="main">

    <!-- TÍTULO -->
    <section class="topo">
        <h1>Meus Produtos</h1>
    </section>

    <!-- BUSCA (agora funcional via JS) -->
    <section class="busca">
        <div class="input-wrapper">
            <img src="../static/assets/lupa.png" class="icone-busca" alt="">
            <input id="searchInput" type="text" placeholder="Pesquisar Produtos...">
        </div>
    </section>

    <!-- AÇÕES -->
    <section class="acoes">
        <button class="acao-btn">
            <img src="../static/assets/download.png" alt="">
            <span>Baixar Template Excel</span>
        </button>

        <button class="acao-btn">
            <img src="../static/assets/upload.png" alt="">
            <span>Enviar Planilha</span>
        </button>

        <button class="acao-btn">
            <img src="../static/assets/mais.png" alt="">
            <span>Adicionar Produto</span>
        </button>
    </section>

    <!-- CONTAINER DINÂMICO -->
    <section id="produtosContainer" class="produtores-container">
        <!-- JS vai renderizar os cards aqui -->
    </section>

</main>

<!-- JS DO SISTEMA -->
<script src="../static/js/produtores/rendenizar.js"></script>

</body>
</html>
