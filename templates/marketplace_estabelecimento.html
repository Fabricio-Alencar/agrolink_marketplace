<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Marketplace de Produtores</title>
    
    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../static/css/estabelecimentos/style.css">
</head>
<body>

    <header>
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="logo-container">
            <span class="logo-emoji">🌱</span>
            <span class="logo-text">AgroConnect</span>
        </div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="side-drawer" id="sideDrawer">
        <div class="drawer-header">
            <span class="drawer-title">Menu</span>
            <button class="close-drawer" id="closeDrawerBtn">&times;</button>
        </div>
        <ul class="drawer-links">
            <li><a href="#" onclick="window.location.href='/perfil'; return false;">Perfil</a></li>
            <li><a href="#" onclick="window.location.href='/pedidos'; return false;">Negociações / Pedidos</a></li>
        </ul>
    </nav>

    <div class="top-section">
        <h1>Marketplace</h1>

        <div class="search-container">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            
            <input type="text" id="searchInput" placeholder="Buscar produtos ou produtores...">
        </div>
    </div>

    <div class="main-container">
        
        <aside class="sidebar">

            <div class="filter-card">

                <div class="filter-header">
                    <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
                    Filtros
                </div>

                <div class="filter-group">
                    <label>
                        <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.41l9 9c.36.36.86.58 1.41.58s1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41s-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
                        Categoria
                    </label>

                    <select id="filterCategory">
                        <option value="Todos">Todos</option>
                        <option value="Frutas">Frutas</option>
                        <option value="Vegetais">Vegetais</option>
                        <option value="Laticínios">Laticínios</option>
                        <option value="Grãos">Grãos</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        Estado
                    </label>

                    <select id="filterState">
                        <option value="Todos">Todos</option>
                        <option value="SP">São Paulo (SP)</option>
                        <option value="MG">Minas Gerais (MG)</option>
                        <option value="PR">Paraná (PR)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>
                        <svg viewBox="0 0 24 24"><path d="M15 11V5l-3-3-3 3v2H3v14h18V11h-6zm-8 8H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5V9h2v2zm6 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2zm6 12h-2v-2h2v2zm0-4h-2v-2h2v2z"/></svg>
                        Cidade
                    </label>

                    <select id="filterCity">
                        <option value="Todos">Todos</option>
                        <option value="Campinas">Campinas</option>
                        <option value="São Paulo">São Paulo</option>
                        <option value="Poços de Caldas">Poços de Caldas</option>
                        <option value="Londrina">Londrina</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Distância máxima: <span id="distLabel">50</span> km</label>
                    
                    <input type="range" id="filterDistance" class="distance-slider" min="0" max="100" value="50">
                    
                    <div class="distance-labels">
                        <span>5km</span>
                        <span>100km</span>
                    </div>
                </div>
            </div>
            
            <p class="results-count" id="resultsCount">0 Produtos encontrados</p>
        </aside>

        <main class="products-grid" id="productsGrid">
        </main>

    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">

            <button class="btn-voltar" onclick="fecharModal()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Voltar
            </button>
            
            <h2 class="modal-title">Criar Pedido</h2>

            <div class="modal-grid">

                <div>

                    <div class="form-group">
                        <label>Quantidade <span>*</span></label>
                        <div class="qtd-row">
                            <input type="number" id="inputQtd" class="form-control" placeholder="0" min="1">

                            <div class="unit-display">
                                <span>Unidade</span>
                                <strong id="modalUnit">Kg</strong>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Data de Entrega <span>*</span></label>
                        <input type="date" id="inputData" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Descrição (Opcional)</label>
                        <textarea id="inputDesc" class="form-control" placeholder="Ex: Exemplo de instruções para entrega..."></textarea>
                    </div>
                </div>

                <div>
                    <div class="resumo-box">
                        <h3>Resumo do Pedido</h3>

                        <div class="resumo-item">Produto: <strong id="resumoProduto">-</strong></div>
                        <div class="resumo-item">Produtor: <strong id="resumoProdutor">-</strong></div>

                        <div class="resumo-item" style="margin-top: 30px;">Quantidade: <strong id="resumoQtd">- Kg</strong></div>
                        <div class="resumo-item" style="margin-top: 30px;">Data de Entrega: <strong id="resumoData">-</strong></div>
                    </div>
                </div>
            </div>

            <button class="btn-publicar" onclick="emitirPedido()">
                <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                Publicar Pedido
            </button>
        </div>
    </div>

    <script src="../static/js/estabelecimentos/lógica.js"></script>
</body>
</html>
